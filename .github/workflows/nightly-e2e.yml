name: Nightly e2e smoke

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install test dependencies
        run: pip install -r requirements-dev.txt

      - name: Prepare env and start core stack
        run: |
          cp .env.example .env
          docker compose up -d influxdb minio db_mlflow mlflow api_server nginx

      - name: Wait for nginx/api health
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost/api/health > /tmp/health.json; then
              cat /tmp/health.json
              exit 0
            fi
            sleep 5
          done
          echo "API health check failed"
          docker compose ps
          exit 1

      - name: Run e2e smoke tests
        env:
          E2E_BASE_URL: http://localhost
        run: pytest -m e2e --junitxml=e2e-junit.xml

      - name: Upload e2e artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-smoke-artifacts
          path: |
            e2e-junit.xml

      - name: Collect compose logs
        if: failure()
        run: docker compose logs --no-color > compose-e2e.log

      - name: Upload compose logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: compose-e2e-log
          path: compose-e2e.log

      - name: Shutdown stack
        if: always()
        run: docker compose down -v
