# CD: build and push api_server image to GitHub Container Registry (GHCR).
name: Publish API image

on:
  push:
    branches: [main]
    paths:
      - Dockerfile.api
      - scripts/**
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set image name (lowercase for GHCR)
        run: |
          echo "IMAGE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')/api" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push image
        id: build_push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.api
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Write release metadata snippet
        run: |
          cat <<EOF > image-release.json
          {
            "repository": "${{ github.repository }}",
            "git_sha": "${{ github.sha }}",
            "image": "${{ env.IMAGE }}",
            "digest": "${{ steps.build_push.outputs.digest }}"
          }
          EOF

      - name: Upload publish metadata
        uses: actions/upload-artifact@v4
        with:
          name: api-image-metadata
          path: image-release.json
