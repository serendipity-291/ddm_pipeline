# CI: dashboard lint/build, Python compile check, Docker image build, compose file validation.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dashboard:
    name: Dashboard (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  python-sanity:
    name: Python (compile + unit + integration)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install requirements
        run: pip install -r requirements-dev.txt

      - name: Byte-compile scripts
        run: python -m compileall -q scripts

      - name: Unit tests + coverage
        run: |
          pytest -m unit --cov=scripts --cov-report=xml --cov-report=term --junitxml=unit-junit.xml

      - name: Integration tests
        run: |
          pytest -m integration --junitxml=integration-junit.xml

      - name: Upload Python test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-test-artifacts
          path: |
            coverage.xml
            unit-junit.xml
            integration-junit.xml

  docker-api:
    name: Docker (Dockerfile.api)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build api image
        run: docker build -f Dockerfile.api -t ddm-api:ci .

  compose-validate:
    name: Docker Compose (config)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Placeholder env for variable substitution
        run: cp .env.example .env

      - name: Validate compose file
        run: docker compose -f docker-compose.yml config --quiet
