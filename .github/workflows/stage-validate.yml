name: Stage validate by digest

on:
  workflow_dispatch:
    inputs:
      image_digest:
        description: "GHCR image digest (example: sha256:...)"
        required: true
        type: string

permissions:
  contents: read
  packages: read

jobs:
  stage-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image name
        run: |
          echo "IMAGE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')/api" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull digest image
        run: docker pull "${IMAGE}@${{ inputs.image_digest }}"

      - name: Run container health check
        run: |
          docker run -d --name api-stage-test \
            -e INFLUXDB_TOKEN=dummy-token \
            -p 18000:8000 \
            "${IMAGE}@${{ inputs.image_digest }}"
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:18000/health; then
              exit 0
            fi
            sleep 2
          done
          docker logs api-stage-test
          exit 1

      - name: Rollback note artifact
        run: |
          cat <<EOF > rollback-note.txt
          Rollback strategy:
          1) Redeploy previous known-good digest.
          2) Validate /health and /model/status.
          3) Re-point production deployment reference.
          EOF

      - name: Upload stage validation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stage-validate-artifacts
          path: |
            rollback-note.txt

      - name: Cleanup
        if: always()
        run: docker rm -f api-stage-test || true
