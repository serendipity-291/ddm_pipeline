events {}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Use Docker's embedded DNS resolver so container hostnames always resolve
    # even after a container restart changes the IP address
    resolver 127.0.0.11 valid=10s ipv6=off;

    server {
        listen 80;

        # API Server Reverse Proxy
        location /api/ {
            # Force runtime DNS re-resolution to avoid stale upstream IP after container restart
            set $api_upstream http://api_server:8000;
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass $api_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Dashboard React App
        location /dashboard/ {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /dashboard/index.html;
        }

        # Airflow
        location /airflow/ {
            proxy_pass http://airflow-webserver:8080/airflow/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;
        }

        # Grafana
        location /grafana/ {
            proxy_pass http://grafana:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # MLFlow
        location /mlflow/ {
            proxy_pass http://mlflow:5000/;
            proxy_set_header Host $host;
        }

        # MinIO Console
        location /minio/ {
            proxy_pass http://minio:9001/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            # MinIO sets X-Frame-Options: DENY by default — override to allow iframe embedding
            proxy_hide_header X-Frame-Options;
            add_header X-Frame-Options "SAMEORIGIN";
        }

        # Prometheus
        location /prometheus/ {
            proxy_pass http://prometheus:9090;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Root redirect
        location = / {
            return 301 /dashboard/;
        }
    }
}
